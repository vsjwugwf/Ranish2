name: Bo

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # ★ این دو خط رو اضافه کن تا از موتور جدید استفاده بشه
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      # ... بقیهٔ قدم‌ها دقیقاً مثل قبل ...

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب پیش‌نیازهای صوتی و تصویری
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb pulseaudio pulseaudio-utils ffmpeg

      - name: راه‌اندازی نمایشگر و صدای مجازی
        run: |
          # نمایشگر مجازی Xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # صدای مجازی PulseAudio با loopback
          pulseaudio -D --exit-idle-time=-1
          sleep 1
          pactl load-module module-null-sink sink_name=virtual_out
          pactl load-module module-loopback source=virtual_out.monitor
          pactl set-default-sink virtual_out
          echo "PULSE_SERVER=unix:/run/user/$(id -u)/pulse/native" >> $GITHUB_ENV
          echo "PULSE_SINK=virtual_out" >> $GITHUB_ENV

      - name: نصب کتابخانه‌های پایتون
        run: |
          pip install requests beautifulsoup4 playwright
          pip install playwright_stealth

      - name: نصب مرورگرهای Playwright (کروم و فایرفاکس)
        run: |
          playwright install chromium
          playwright install firefox
          playwright install-deps chromium
          playwright install-deps firefox

      - name: اجرای ربات (۳۵۵ دقیقه)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          timeout 21300 python Bot.py
