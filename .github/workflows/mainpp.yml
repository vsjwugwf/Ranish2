name: Bot Pro222222

on:
  schedule:
    - cron: "0 */6 * * *"        # هر ۶ ساعت یکبار
  workflow_dispatch:            # اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360         # حداکثر ۶ ساعت
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # رفع هشدار Node.js 20
      DISPLAY: :99               # نمایشگر مجازی برای فایرفاکس

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب Xvfb، FFmpeg و PulseAudio
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio

      - name: راه‌اندازی نمایشگر مجازی (Xvfb)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1

      - name: نصب کتابخانه‌های پایتون و مرورگرها
        run: |
          pip install requests beautifulsoup4 playwright
          pip install playwright_stealth
          playwright install --with-deps chromium
          playwright install --with-deps firefox

      - name: اجرای ربات (۳۵۵ دقیقه)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          timeout 21300 python Bot.py
