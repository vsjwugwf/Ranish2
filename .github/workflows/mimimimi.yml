name: Bot23 Stable Runnerccy

on:
  schedule:
    - cron: "0 */6 * * *"        # هر ۶ ساعت یک‌بار
  workflow_dispatch:            # اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360         # حداکثر ۶ ساعت
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # تأکید دوباره برای Node 24

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v5   # ★ ورژن جدیدتر

      - name: نصب پایتون
        uses: actions/setup-python@v6   # ★ ورژن جدیدتر
        with:
          python-version: '3.10'

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg
          pip install requests beautifulsoup4 playwright
          pip install playwright_stealth

      - name: نصب کروم برای Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: اجرای ربات (۳۵۵ دقیقه)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          timeout 21300 python Bot.py
