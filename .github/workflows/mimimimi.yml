name: Beeee Yooo

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies (Audio & Video)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pulseaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4 playwright-stealth

      - name: Install Playwright Browsers & Dependencies
        run: |
          # نسخه ۲۲ هم به کروم و هم به فایرفاکس نیاز دارد
          python -m playwright install chromium firefox
          python -m playwright install-deps chromium firefox

      - name: Run bot with Virtual Audio Setup
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          # راه‌اندازی سرور صدای مجازی دقیقاً با نام virtual_out (مطابق خط 559 فایل Bot22.py)
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=virtual_out
          pactl set-default-sink virtual_out
          
          # اجرای ربات
          python Bot.py
