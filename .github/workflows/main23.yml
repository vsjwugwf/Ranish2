name: Bot23

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# اضافه کردن دسترسی برای پوش کردن فایل بکاپ
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg
          pip install requests beautifulsoup4 playwright
          pip install playwright_stealth

      - name: نصب مرورگر کروم برای Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: اجرای ربات (۳۵۵ دقیقه)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        # نام فایل به bot23.py اصلاح شد
        run: |
          timeout 21300 python Bot.py
